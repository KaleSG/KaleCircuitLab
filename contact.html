<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact • Basic Site</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <div class="header-inner">
        <a class="logo" href="./index.html" aria-label="Homepage">
          LOGO
        </a>

        <nav class="nav" aria-label="Primary">
          <a href="./index.html">Home</a>
          <a href="./about.html">About</a>
          <a href="./contact.html" aria-current="page">Contact</a>
        </nav>
      </div>
    </header>

    <main id="main" class="container">
      <section>
        <section class="contact-card">
          <div class="contact-photo" aria-hidden="true">
            <span>Photo</span>
          </div>
          <div class="contact-details">
            <p>Email: KaleCircuitLab@gmail.com</p>
            <p class="social-row">
              <span class="social-icon" aria-hidden="true">
                <img
                  src="img/social-icons/instagram-logo.png"
                  alt="Instagram logo"
                />
              </span>
              <span class="social-handle">KaleCircuitLab</span>
            </p>
            <p class="social-row">
              <span class="social-icon" aria-hidden="true">
                <img
                  src="img/social-icons/youtube-logo.png"
                  alt="YouTube logo"
                />
              </span>
              <span class="social-handle">KaleCircuitLab</span>
            </p>
          </div>
        </section>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <span>© 2026 KaleCircuitLab</span>
      </div>
    </footer>
  </body>
</html>
